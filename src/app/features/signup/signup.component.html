<h2>Signup</h2>

<form (ngSubmit)="signup()">
  <label>Email:</label><br />
  <input type="text" [(ngModel)]="email" name="email" required /><br /><br />

  <label>Password:</label><br />
  <input type="password" [(ngModel)]="password" name="password" required /><br /><br />

  <button type="submit"  color="primary">Signup</button>
</form>
<p *ngIf="errormsg" style="color:red;">{{ messageValidation }}</p>
<!-- <p *ngIf="message" style="color:green;">{{ message }}</p> -->

<p>
  Already have an account?
  <a routerLink="/login"  mat-raised-button color="primary">Login</a>
</p>
